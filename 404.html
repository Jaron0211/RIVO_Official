<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — 找不到頁面 | RIVO</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@600;800&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#000000;
    --paper:#fffdf8;
    --accent:#ff5108;
    --disp:'Funnel Display','Noto Sans TC',sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--paper);font-family:var(--disp);min-height:100vh;
    display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:8vw}
  .label{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent);display:flex;align-items:center;gap:9px;margin-bottom:24px}
  .label::before{content:'';width:9px;height:9px;background:currentColor;display:inline-block}
  h1{font-size:clamp(64px,16vw,220px);font-weight:800;letter-spacing:-.045em;line-height:.88}
  p{font-family:var(--mono);font-size:14px;line-height:1.7;color:#e7e7e7;margin-top:24px;max-width:44ch}
  a.btn{margin-top:32px;display:inline-block;background:var(--accent);color:var(--ink);
    font-family:var(--mono);font-size:14px;padding:14px 22px;letter-spacing:.04em;text-decoration:none}
</style>
</head>
<body>
  <div class="label">Error 404</div>
  <h1>NOT<br>FOUND.</h1>
  <p>找不到這個頁面。它可能已被移動或不存在。<br>The page you are looking for does not exist.</p>
  <a class="btn" href="/">回到首頁 / Back to Home →</a>
</body>
</html>

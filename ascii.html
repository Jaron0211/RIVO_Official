<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIVO</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --ink:#ffffff;
    --noise:#2e2e2e;     /* 噪音字元顏色，深灰（反相、調亮） */
    --muted:#656565;
    --line:#1a1a1a;
    --accent:#ffffff;
    --mono:'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--mono);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- 背景 ASCII 白噪音 ---------- */
  #noise{
    position:fixed;
    inset:0;
    z-index:0;
    color:var(--noise);
    font-family:var(--mono);
    font-size:7px;          /* 字元再縮一半（原 14px） */
    line-height:1.5;        /* 隨機背景行高調高 */
    white-space:pre;
    overflow:hidden;
    user-select:none;
    pointer-events:none;
    letter-spacing:0;
  }

  /* ---------- 頂部列 ---------- */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    z-index:30;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 28px;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
  }
  /* navbar logo：首頁隱藏，進入內頁才淡入 */
  .brand{
    display:flex;align-items:center;
    background:none;border:none;padding:0;cursor:pointer;
    opacity:0;
    transform:translateY(-4px);
    transition:opacity .4s ease, transform .4s ease;
    pointer-events:none;
  }
  .brand img{height:20px;display:block}
  body.in-page .brand{opacity:1;transform:translateY(0);pointer-events:auto}
  .lang-toggle{
    display:flex;gap:2px;align-items:center;
    border:1px solid var(--line);
    border-radius:2px;
    overflow:hidden;
  }
  .lang-toggle button{
    background:transparent;border:none;cursor:pointer;
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;
    padding:6px 10px;color:var(--muted);
  }
  .lang-toggle button.active{background:var(--ink);color:var(--bg)}

  /* ---------- Screen 容器 ---------- */
  .screen{
    position:fixed;
    inset:0;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:80px 24px;
    opacity:0;
    visibility:hidden;
    transform:translateY(8px);
    transition:opacity .5s ease, transform .5s ease, visibility .5s;
  }
  .screen.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
  }

  /* ---------- 首頁 logo ---------- */
  #logo{
    font-family:var(--mono);
    color:var(--ink);
    white-space:pre;
    line-height:1.0;
    font-size:7px;          /* 由 JS fitLogo() 依視窗寬度覆寫 */
    letter-spacing:0;
    user-select:none;
    display:inline-block;   /* 等寬行以「整塊」置中，避免每行各自置中而剪歪 */
    text-align:left;
    margin-bottom:18px;
  }
  .tagline{
    font-size:12px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:54px;
    text-align:center;
  }

  /* ---------- 首頁 3 選項：純文字、水平排開 ---------- */
  .menu{
    display:flex;
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
    align-items:baseline;
    gap:38px;
  }
  .menu-item{
    cursor:pointer;
    background:none;
    border:none;
    padding:4px 0;
    font-family:var(--mono);
    font-size:15px;
    letter-spacing:.06em;
    color:var(--ink);
    position:relative;
    transition:letter-spacing .25s ease, opacity .25s ease;
  }
  .menu-item .idx{
    color:var(--muted);
    font-size:10px;
    margin-right:8px;
    vertical-align:2px;
  }
  /* hover：純文字 + 浮現的方括號標示，不用框 */
  .menu-item::before,
  .menu-item::after{
    color:var(--muted);
    opacity:0;
    transition:opacity .25s ease;
  }
  .menu-item::before{content:'[ ';}
  .menu-item::after{content:' ]';}
  .menu-item:hover{letter-spacing:.12em}
  .menu-item:hover::before,
  .menu-item:hover::after{opacity:1}

  /* ---------- 內頁 ---------- */
  .page-inner{
    width:min(720px,92vw);
    text-align:left;
  }
  .page-kicker{
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--muted);margin-bottom:18px;
  }
  .page-title{
    font-size:40px;font-weight:700;line-height:1.05;margin-bottom:22px;
    letter-spacing:-.01em;
  }
  .page-body{
    font-size:15px;line-height:1.8;color:#333;max-width:560px;
  }
  .back{
    margin-top:46px;
    display:inline-flex;align-items:center;gap:10px;
    cursor:pointer;background:none;border:none;
    font-family:var(--mono);font-size:12px;letter-spacing:.15em;
    text-transform:uppercase;color:var(--ink);
  }
  .back:hover{opacity:.6}

  @media (max-width:768px){
    #logo{font-size:4px}
    .page-title{font-size:30px}
  }
</style>
</head>
<body>

  <!-- 背景白噪音 -->
  <div id="noise" aria-hidden="true"></div>

  <!-- 頂列 -->
  <div class="topbar">
    <button class="brand" onclick="go('home')" aria-label="RIVO home">
      <img src="assets/logo-white.png" alt="RIVO">
    </button>
    <div class="lang-toggle">
      <button data-lang="zh" onclick="setLang('zh')">中</button>
      <button data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <!-- 首頁 -->
  <section class="screen active" id="screen-home">
    <pre id="logo">loading…</pre>
    <div class="tagline" data-i18n="tagline">ROBOT FLEET, ONE COMMAND</div>
    <nav class="menu">
      <button class="menu-item" onclick="go('rpilot')">
        <span class="idx">01</span><span data-i18n="nav.rpilot">RPilot 飛控</span>
      </button>
      <button class="menu-item" onclick="go('gcs')">
        <span class="idx">02</span><span data-i18n="nav.gcs">RIVO GCS</span>
      </button>
      <button class="menu-item" onclick="go('contact')">
        <span class="idx">03</span><span data-i18n="nav.contact">聯繫我們</span>
      </button>
    </nav>
  </section>

  <!-- RPilot -->
  <section class="screen" id="screen-rpilot">
    <div class="page-inner">
      <div class="page-kicker">01 / RPILOT</div>
      <h1 class="page-title" data-i18n="rpilot.title">RPilot 飛控</h1>
      <p class="page-body" data-i18n="rpilot.body">飛控系統介紹（樣板佔位內容）。</p>
      <button class="back" onclick="go('home')">← <span data-i18n="back">返回</span></button>
    </div>
  </section>

  <!-- GCS -->
  <section class="screen" id="screen-gcs">
    <div class="page-inner">
      <div class="page-kicker">02 / RIVO GCS</div>
      <h1 class="page-title" data-i18n="gcs.title">RIVO GCS</h1>
      <p class="page-body" data-i18n="gcs.body">地面控制站介紹（樣板佔位內容）。</p>
      <button class="back" onclick="go('home')">← <span data-i18n="back">返回</span></button>
    </div>
  </section>

  <!-- Contact -->
  <section class="screen" id="screen-contact">
    <div class="page-inner">
      <div class="page-kicker">03 / CONTACT</div>
      <h1 class="page-title" data-i18n="contact.title">聯繫我們</h1>
      <p class="page-body" data-i18n="contact.body">與我們聯繫（樣板佔位內容）。</p>
      <button class="back" onclick="go('home')">← <span data-i18n="back">返回</span></button>
    </div>
  </section>

<script>
/* ============ i18n ============ */
const I18N = {
  zh:{
    brand:'RIVO',
    tagline:'機器人群控，一鍵指揮',
    'nav.rpilot':'RPilot 飛控',
    'nav.gcs':'RIVO GCS',
    'nav.contact':'聯繫我們',
    back:'返回',
    'rpilot.title':'RPilot 飛控',
    'rpilot.body':'開源無人機飛行控制系統。樣板佔位內容，之後再填入正式介紹。',
    'gcs.title':'RIVO GCS',
    'gcs.body':'地面控制站，統一監控與管理你的機器人機隊。樣板佔位內容。',
    'contact.title':'聯繫我們',
    'contact.body':'想了解更多或洽談合作？樣板佔位內容，之後接上聯絡表單。',
  },
  en:{
    brand:'RIVO',
    tagline:'ROBOT FLEET, ONE COMMAND',
    'nav.rpilot':'RPilot FC',
    'nav.gcs':'RIVO GCS',
    'nav.contact':'Contact',
    back:'Back',
    'rpilot.title':'RPilot Flight Controller',
    'rpilot.body':'Open-source drone flight control system. Placeholder copy — real content to come.',
    'gcs.title':'RIVO GCS',
    'gcs.body':'Ground control station to monitor and manage your robot fleet in one place. Placeholder copy.',
    'contact.title':'Contact Us',
    'contact.body':'Want to learn more or talk partnership? Placeholder copy — contact form to be wired up.',
  }
};
let lang = localStorage.getItem('rivo_lang') || 'zh';
function applyI18n(){
  const dict = I18N[lang] || I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k]!=null) el.textContent = dict[k];
  });
  document.documentElement.lang = lang==='zh' ? 'zh-Hant' : 'en';
  document.querySelectorAll('.lang-toggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===lang);
  });
}
function setLang(l){ lang=l; localStorage.setItem('rivo_lang',l); applyI18n(); }

/* ============ Screen 切換 ============ */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const t = document.getElementById('screen-'+id);
  if(t) t.classList.add('active');
  // 內頁顯示 navbar logo，首頁保持乾淨
  document.body.classList.toggle('in-page', id!=='home');
  const hash = id==='home' ? '' : '#'+id;
  if(location.hash !== hash) history.replaceState(null,'',hash || location.pathname);
}
// 支援 deep-link（?? #rpilot 等）與瀏覽器返回
function routeFromHash(){ go((location.hash||'#home').slice(1) || 'home'); }
window.addEventListener('hashchange', routeFromHash);

/* ============ ASCII logo（從噪音浮現 + 持續 glitch 閃爍） ============ */
const logoEl = document.getElementById('logo');
let logoLines = [];          // 原始字元 2D 陣列
let logoPos = [];            // 所有非空白位置 "r,c"
let revealed = new Set();    // 已浮現的位置
let glitch = new Map();      // 暫態 glitch：位置 -> 噪音字元
const NOISE_CHARS = '. , : ; * + = ~ ^ / \\ | _ - °'.split(' ').filter(Boolean).concat(['0','1','#','%','&','<','>']);
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

// 依視窗寬度自動把 logo 放大到目標寬度（不會 overflow）
const LOGO_TARGET_VW = 0.60;   // 佔視窗寬度比例
const LOGO_MAX_PX = 40;        // 字級上限，避免超大螢幕過頭
function fitLogo(){
  if(!logoLines.length) return;
  logoEl.style.fontSize = '10px';
  const natural = logoEl.scrollWidth || 1;
  const target = window.innerWidth * LOGO_TARGET_VW;
  let fs = 10 * target / natural;
  fs = Math.min(fs, LOGO_MAX_PX);
  logoEl.style.fontSize = fs.toFixed(2) + 'px';
}
/* 簍空狀態：只顯示一部分字元，缺口隨機分布並持續飄動 */
const LOGO_DENSITY = 0.6;     // 顯示比例（其餘簍空為空白）
const LOGO_DRIFT   = 0.04;    // 每次隨機翻動的比例（缺口遊走速度）
let shown = new Set();        // 目前顯示的字元位置
const LOGO_STRIDE = 1000;      // 位置數字 key = r*STRIDE + c（cols < STRIDE）
function renderLogo(){
  let out = '';
  for(let r=0;r<logoLines.length;r++){
    const row = logoLines[r], base = r*LOGO_STRIDE;
    let line = '';
    for(let c=0;c<row.length;c++){
      const ch = row[c];
      line += (ch !== ' ' && shown.has(base + c)) ? ch : ' ';   // 簍空＝空白
    }
    out += line + '\n';
  }
  logoEl.textContent = out;
}
function initLogo(txt){
  logoLines = txt.replace(/\n+$/,'').split('\n').map(l=>l.replace(/\s+$/,'').split(''));
  logoPos = [];
  logoLines.forEach((row,r)=>row.forEach((ch,c)=>{ if(ch!==' ') logoPos.push(r*LOGO_STRIDE + c); }));
  shown = new Set();
  renderLogo();
  fitLogo();          // 量好版面再放大
  // 載入：隨機順序逐步浮現到目標密度，停在簍空狀態
  const order = logoPos.slice().sort(()=>Math.random()-0.5);
  const target = Math.floor(logoPos.length * LOGO_DENSITY);
  let i=0;
  (function reveal(){
    const n = Math.ceil(target/26);
    for(let k=0;k<n && i<target;k++,i++) shown.add(order[i]);
    renderLogo();
    if(i<target) requestAnimationFrame(reveal);
  })();
}
// 持續隨機飄動：關掉一些、開啟一些，維持簍空密度
function tickLogo(){
  if(!logoPos.length || !shown.size) return;
  const flips = Math.max(1, Math.floor(logoPos.length * LOGO_DRIFT));
  const on = [...shown];
  for(let k=0;k<flips;k++){
    const off = on[Math.floor(Math.random()*on.length)];
    if(off) shown.delete(off);
  }
  let added=0, guard=0;
  while(added<flips && guard<flips*5){
    guard++;
    const key = pick(logoPos);
    if(!shown.has(key)){ shown.add(key); added++; }
  }
  renderLogo();
}
setInterval(tickLogo, 95);

fetch('assets/rivo-logo-table.ascii')
  .then(r=>r.text())
  .then(initLogo)
  .catch(()=>{ logoEl.textContent='RIVO'; });

/* ============ 流動 ASCII 背景（plasma / FBM 流場，像 shader 一樣緩慢流動） ============ */
const noiseEl = document.getElementById('noise');
// 灰階對照表 ramp（亮→暗）
const TABLE_RAMP = '.:*I$JTLCYZVSUGPAOXFDE#RKHBQNWM';
const FLOW_GLYPHS = TABLE_RAMP;
let nCols=0, nRows=0;
function buildFlow(){
  const cw = 4.2, ch = 10.5;                 // 列距配合行高 1.5（7px×1.5）
  nCols = Math.ceil(window.innerWidth / cw) + 2;
  nRows = Math.ceil(window.innerHeight / ch) + 2;
}
// 多層正弦疊加的平滑流場：四個「可分離」項，每幀各預算一次成查表，
// 每格只做加法 + 查表（移除每格的 sqrt 與重複 sin）→ 大幅降低運算量
let flowT = 0;
const RL = FLOW_GLYPHS.length, FLOW_TH = 0.62, FLOW_SPAN = 0.38;
function renderFlow(){
  const C = nCols, R = nRows, t = flowT;
  const aX = new Float64Array(C), aXY = new Float64Array(C + R), aD = new Float64Array(C + R);
  const aY = new Float64Array(R);
  for(let c=0;c<C;c++) aX[c] = Math.sin(c*0.095 + t);
  for(let r=0;r<R;r++) aY[r] = Math.sin(r*0.125 - t*0.8);
  for(let k=0;k<C+R;k++) aXY[k] = Math.sin(k*0.075 + t*0.6);     // 對角 (x+y)
  for(let k=0;k<C+R;k++) aD[k]  = Math.sin((k-R)*0.06 - t*0.7);  // 反對角 (x-y)
  let out = '';
  for(let r=0;r<R;r++){
    const yr = aY[r];
    let line = '';
    for(let c=0;c<C;c++){
      const v = (aX[c] + yr + aXY[c+r] + aD[c-r+R] + 4) / 8;     // 0..1
      if(v < FLOW_TH){ line += ' '; continue; }
      let idx = ((v - FLOW_TH) / FLOW_SPAN * RL) | 0;
      line += FLOW_GLYPHS[idx < RL ? idx : RL-1];
    }
    out += line + '\n';
  }
  noiseEl.textContent = out;
}
let flowRAF = 0, flowLast = 0;
function flowLoop(ts){
  flowRAF = requestAnimationFrame(flowLoop);
  if(ts - flowLast < 80) return;             // 節流到 ~12fps（環境背景夠慢，省效能）
  flowLast = ts;
  flowT += 0.085;                            // 幀率降低，每幀位移略增以維持流速
  renderFlow();
}
buildFlow();
renderFlow();
requestAnimationFrame(flowLoop);
window.addEventListener('resize', ()=>{ buildFlow(); renderFlow(); fitLogo(); });

applyI18n();
routeFromHash();
</script>
</body>
</html>
